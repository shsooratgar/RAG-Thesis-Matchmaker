<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 640"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .num         { font-size: 12px; font-weight: 700; fill: #fff;
                     text-anchor: middle; dominant-baseline: central; }
      .stage-label { font-size: 11px; font-weight: 600; text-anchor: middle; }
      .stage-sub   { font-size: 9.5px; text-anchor: middle; }
      .box-title   { font-size: 15px; font-weight: 600; text-anchor: middle; }
      .box-sub     { font-size: 11.5px; font-weight: 400; text-anchor: middle; }
      .tag-label   { font-size: 10.5px; font-weight: 600; }
      .legend-text { font-size: 10.5px; fill: #444441; }
      .title       { font-size: 13px; font-style: italic; font-weight: 500;
                     fill: #444441; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background (so the diagram renders the same in light & dark README modes) -->
  <rect width="100%" height="100%" fill="#0E0E0E"/>

  <!-- ================= LibreChat (top-left) ================= -->
  <rect x="15" y="15" width="755" height="175" rx="14"
        fill="none" stroke="#534AB7" stroke-width="1.2"
        stroke-dasharray="6 4" opacity="0.75"/>
  <text x="28" y="37" fill="#534AB7" class="tag-label">LibreChat</text>

  <rect x="28" y="45" width="240" height="140" rx="10"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.6"/>
  <rect x="38" y="55" width="220" height="10" rx="4" fill="#AFA9EC" opacity="0.5"/>
  <circle cx="45" cy="60" r="2.2" fill="#534AB7" opacity="0.6"/>
  <circle cx="53" cy="60" r="2.2" fill="#534AB7" opacity="0.4"/>
  <circle cx="61" cy="60" r="2.2" fill="#534AB7" opacity="0.3"/>
  <rect x="43" y="73" width="140" height="11" rx="4" fill="#AFA9EC" opacity="0.4"/>
  <rect x="80" y="89" width="125" height="11" rx="4" fill="#7F77DD" opacity="0.35"/>

  <text x="43" y="120" fill="#534AB7" class="tag-label">UI — user message</text>
  <rect x="38" y="126" width="220" height="52" rx="6"
        fill="#ffffff" stroke="#AFA9EC" stroke-width="0.7"/>
  <text x="48" y="140" fill="#2A2470" font-weight="600" font-size="11">Q: "I am interested in</text>
  <text x="48" y="154" fill="#2A2470" font-weight="600" font-size="11">misinformation detection"</text>
  <text x="48" y="169" fill="#534AB7" font-size="10">Topic · Degree/Program</text>
  <rect x="230" y="150" width="20" height="20" rx="4" fill="#534AB7"/>
  <text x="240" y="164" text-anchor="middle" fill="#EEEDFE" font-size="12">→</text>

  <!-- ================= Agent (center-top) ================= -->
  <rect x="345" y="65" width="180" height="80" rx="12"
        fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
  <text x="435" y="98" class="box-title" fill="#FAF9F5">Agent</text>
  <text x="435" y="118" class="box-sub" fill="#B6E7D4">Central orchestrator</text>

  <!-- ================= MCP config (top-right) ================= -->
  <rect x="575" y="30" width="190" height="150" rx="12"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="670" y="48" class="tag-label" text-anchor="middle" fill="#633806">MCP config</text>
  <rect x="587" y="58" width="166" height="22" rx="5"
        fill="#FAC775" stroke="#EF9F27" stroke-width="0.5" opacity="0.55"/>
  <text x="595" y="72" fill="#633806" font-size="10.5" opacity="0.8">MCP 1: Weather</text>
  <rect x="587" y="85" width="166" height="22" rx="5"
        fill="#FAC775" stroke="#EF9F27" stroke-width="0.5" opacity="0.55"/>
  <text x="595" y="99" fill="#633806" font-size="10.5" opacity="0.8">MCP 2: Mensa</text>
  <rect x="587" y="112" width="166" height="42" rx="5"
        fill="#BA7517" stroke="#854F0B" stroke-width="1"/>
  <text x="595" y="126" fill="#FAEEDA" font-size="10.5" font-weight="600">MCP 3: Master Thesis Rec.</text>
  <text x="595" y="140" fill="#FAC775" font-size="9.5">← active in this flow</text>

  <!-- ================= LLM (bottom-left) ================= -->
  <rect x="45" y="395" width="180" height="85" rx="12"
        fill="#378ADD" stroke="#185FA5" stroke-width="1"/>
  <text x="135" y="430" class="box-title" fill="#FAF9F5">LLM</text>
  <text x="135" y="450" class="box-sub" fill="#C4DDF5">Reasoning core</text>

  <!-- ================= MCP Master Thesis Recommender ================= -->
  <rect x="400" y="330" width="355" height="240" rx="16"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="577" y="350" class="tag-label" text-anchor="middle" fill="#633806">MCP — Master Thesis Recommender</text>

  <rect x="420" y="365" width="165" height="46" rx="8"
        fill="#FAC775" stroke="#EF9F27" stroke-width="0.7"/>
  <text x="502" y="383" text-anchor="middle" fill="#633806" font-size="12" font-weight="600">RAG Retrieval</text>
  <text x="502" y="400" text-anchor="middle" fill="#854F0B" font-size="10">Embed + semantic query</text>

  <rect x="615" y="365" width="120" height="46" rx="8"
        fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.7"/>
  <text x="675" y="383" text-anchor="middle" fill="#444441" font-size="12" font-weight="600">LLM</text>
  <text x="675" y="400" text-anchor="middle" fill="#444441" font-size="10">embed</text>

  <ellipse cx="502" cy="515" rx="72" ry="10" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <rect x="430" y="505" width="144" height="36" fill="#EF9F27"/>
  <rect x="430" y="505" width="144" height="36" fill="none" stroke="#BA7517" stroke-width="0.8"/>
  <ellipse cx="502" cy="505" rx="72" ry="10" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="502" y="524" text-anchor="middle" fill="#412402" font-size="12" font-weight="600">Vector DB</text>
  <text x="502" y="538" text-anchor="middle" fill="#633806" font-size="10">thesis embeddings</text>

  <path d="M 478 411 L 478 497" stroke="#BA7517" stroke-width="1.2"
        fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="455" fill="#854F0B" font-size="10" text-anchor="end">query</text>

  <path d="M 528 498 L 528 412" stroke="#854F0B" stroke-width="1.2"
        fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="455" fill="#854F0B" font-size="10">hits</text>

  <path d="M 585 388 L 613 388" stroke="#BA7517" stroke-width="1.2"
        fill="none" marker-end="url(#arrow)"/>

  <!-- ================================================================ -->
  <!-- ======================= FLOW ARROWS ============================ -->
  <!-- ================================================================ -->

  <!-- ① LibreChat -> Agent -->
  <path d="M 283 92 L 345 92" stroke="#7F77DD" stroke-width="1.8"
        fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(313, 82)">
    <circle r="10" fill="#7F77DD"/>
    <text class="num">1</text>
  </g>
  <text x="313" y="70" class="stage-label" fill="#534AB7">User query</text>

  <!-- ⑧ Agent -> LibreChat -->
  <path d="M 345 125 L 283 125" stroke="#534AB7" stroke-width="1.8"
        fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(313, 135)">
    <circle r="10" fill="#534AB7"/>
    <text class="num">8</text>
  </g>
  <text x="313" y="150" class="stage-label" fill="#534AB7">Answer</text>

  <!-- get tool definitions (setup connection) -->
  <path d="M 525 90 L 575 90" stroke="#BA7517" stroke-width="1.2"
        fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="550" y="80" fill="#BA7517" font-size="10" font-weight="500"
        text-anchor="middle">get tool definitions</text>

  <!-- ④ Agent -> MCP Master Thesis -->
  <path d="M 515 145 Q 555 240 555 330" stroke="#BA7517" stroke-width="1.8"
        fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(572, 235)">
    <circle r="11" fill="#BA7517"/>
    <text class="num">4</text>
  </g>
  <text x="615" y="238" class="stage-label" fill="#854F0B">MCP Input</text>
  <text x="615" y="252" class="stage-sub" fill="#854F0B">topic, degree</text>

  <!-- ⑤ MCP Master Thesis -> Agent -->
  <path d="M 485 330 Q 475 240 480 150" stroke="#BA7517" stroke-width="1.8"
        fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <g transform="translate(465, 245)">
    <circle r="11" fill="#BA7517"/>
    <text class="num">5</text>
  </g>
  <text x="420" y="248" class="stage-label" fill="#854F0B">MCP Output</text>
  <text x="420" y="262" class="stage-sub" fill="#854F0B">matching theses</text>

  <!-- ========= Agent <-> LLM : Round 1 (blue, bulges LEFT) ========= -->
  <!-- ② Agent -> LLM (outbound) -->
  <path d="M 385 145 Q 180 220 95 395" stroke="#378ADD" stroke-width="1.7"
        fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(200, 235)">
    <circle r="11" fill="#378ADD"/>
    <text class="num">2</text>
  </g>
  <text x="185" y="222" class="stage-label" fill="#185FA5" text-anchor="end">Q + Tool desc.</text>

  <!-- ③ LLM -> Agent (return) -->
  <path d="M 135 395 Q 235 245 410 148" stroke="#185FA5" stroke-width="1.7"
        fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <g transform="translate(295, 215)">
    <circle r="11" fill="#185FA5"/>
    <text class="num">3</text>
  </g>
  <text x="255" y="196" class="stage-label" fill="#185FA5" text-anchor="middle">Tool call</text>
  <text x="255" y="208" class="stage-sub" fill="#185FA5" text-anchor="middle">master_thesis(args)</text>

  <!-- ========= Agent <-> LLM : Round 2 (green, bulges RIGHT) ========= -->
  <!-- ⑥ Agent -> LLM (outbound) -->
  <path d="M 445 148 Q 430 325 230 410" stroke="#0F6E56" stroke-width="1.7"
        fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(400, 310)">
    <circle r="11" fill="#0F6E56"/>
    <text class="num">6</text>
  </g>
  <text x="400" y="290" class="stage-label" fill="#0F6E56" text-anchor="middle">Q + MCP output</text>

  <!-- ⑦ LLM -> Agent (return) -->
  <path d="M 225 400 Q 360 360 475 150" stroke="#0F6E56" stroke-width="1.7"
        fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <g transform="translate(330, 375)">
    <circle r="11" fill="#0F6E56"/>
    <text class="num">7</text>
  </g>
  <text x="330" y="403" class="stage-label" fill="#0F6E56" text-anchor="middle">Final answer</text>

  <!-- ================================================================ -->
  <!-- ============================ LEGEND ============================ -->
  <!-- ================================================================ -->
  <rect x="20" y="560" width="365" height="70" rx="10"
        fill="#FAFAF7" stroke="#DEDCD1" stroke-width="0.8"/>
  <text x="32" y="578" fill="#444441" font-size="11.5" font-weight="600">Legend</text>

  <rect x="32" y="587" width="11" height="9" rx="2"
        fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="48" y="595" class="legend-text">AI / Agent</text>

  <rect x="110" y="587" width="11" height="9" rx="2"
        fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="126" y="595" class="legend-text">LLM</text>

  <rect x="160" y="587" width="11" height="9" rx="2"
        fill="#BA7517" stroke="#854F0B" stroke-width="0.5"/>
  <text x="176" y="595" class="legend-text">MCP / Tools</text>

  <rect x="240" y="587" width="11" height="9" rx="2"
        fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="256" y="595" class="legend-text">UI / Infra</text>

  <line x1="32" y1="615" x2="54" y2="615" stroke="#444441"
        stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="60" y="619" class="legend-text">Main flow</text>

  <line x1="130" y1="615" x2="152" y2="615" stroke="#444441"
        stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="158" y="619" class="legend-text">Return / async</text>


  <!-- Title -->
  <text x="580" y="605" class="title">UZH AI Buddy — system architecture</text>
</svg>
